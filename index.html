<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#3D1A06" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="AfroCrave Kitchen" />

    <!-- SEO -->
    <title>AfroCrave Kitchen — Authentic Nigerian Home Cooking</title>
    <meta name="description" content="Order fresh authentic Nigerian home-cooked meals. Delivering across Sunderland and the Northeast." />

    <!-- Open Graph -->
    <meta property="og:title" content="AfroCrave Kitchen" />
    <meta property="og:description" content="Authentic Nigerian home cooking, made fresh to order. Delivering across Sunderland & the Northeast." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/favicon_512.png" />

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon_32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon_180.png" />

    <!-- Global styles -->
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 0;
        background: #F5E6D0;
        min-height: 100vh;
      }
      #root {
        min-height: 100vh;
        background: #F5E6D0;
      }
      @media print {
        body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        .no-print { display: none !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
